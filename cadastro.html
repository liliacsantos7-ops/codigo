<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Auto Escola Sergipana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container-cadastro">
        <header style="display: flex; align-items: flex-start; padding: 20px 40px; position: relative;">
            <div class="icon-box" style="position: static; margin-right: 20px;">
                <div class="icon-car"></div>
            </div>
            <h1 style="text-align: left; margin-bottom: 0;">AUTO ESCOLA<br>SERGIPANA</h1>
        </header>

        <main class="form-padding">
            <form action="servicos.html">
                <div class="input-group">
                    <label>NOME COMPLETO</label>
                    <input type="text" placeholder="Seu nome aqui" required>
                </div>

                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" placeholder="000.000.000-00" required>
                </div>

                <div class="input-group">
                    <label>TELEFONE</label>
                    <input type="tel" placeholder="(79) 00000-0000" required>
                </div>

                <div class="input-group">
                    <label>ENDEREÇO</label>
                    <input type="text" placeholder="Rua, número, bairro" required>
                </div>

                <div class="input-group">
                    <label>EMAIL</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>

                <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                    <button type="submit" class="btn-universal btn-confirmar">
                        <span style="border: 2px solid #003366; border-radius: 50%; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; font-size: 10px;">✓</span> 
                         <div class="button-wrapper">
                <form action="servicos.html">
                    </button>
                </div>
            </form>
        </main>
    </div>

</body>
</html>
